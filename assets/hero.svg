<svg width="1600" height="640" viewBox="0 0 1600 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Git Viewer for Obsidian</title>
  <desc id="desc">A compact Obsidian sidebar showing local Git status groups.</desc>
  <rect width="1600" height="640" rx="0" fill="#111318"/>
  <rect x="92" y="76" width="1416" height="488" rx="26" fill="#181B22" stroke="#303642" stroke-width="2"/>
  <rect x="92" y="76" width="1416" height="68" rx="26" fill="#222633"/>
  <rect x="92" y="118" width="1416" height="26" fill="#222633"/>
  <circle cx="136" cy="111" r="10" fill="#EF4444"/>
  <circle cx="170" cy="111" r="10" fill="#F59E0B"/>
  <circle cx="204" cy="111" r="10" fill="#10B981"/>
  <rect x="128" y="186" width="280" height="330" rx="14" fill="#12151B" stroke="#2B313B"/>
  <rect x="448" y="186" width="452" height="330" rx="14" fill="#12151B" stroke="#2B313B"/>
  <rect x="940" y="186" width="432" height="330" rx="14" fill="#12151B" stroke="#2B313B"/>
  <text x="128" y="152" fill="#C7D2FE" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Git Viewer</text>
  <text x="128" y="236" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="72" font-weight="800">Stay in Obsidian.</text>
  <text x="128" y="304" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="72" font-weight="800">See what changed.</text>
  <text x="128" y="362" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="28">A minimal read-only Git status viewer for vault files.</text>
  <text x="128" y="410" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="28">No pull. No clone. No background sync.</text>
  <g transform="translate(970 222)">
    <rect width="356" height="258" rx="14" fill="#1A1E27" stroke="#343B49"/>
    <text x="22" y="42" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Git Viewer</text>
    <text x="22" y="72" fill="#94A3B8" font-family="SFMono-Regular, Menlo, monospace" font-size="15">main - vault</text>
    <line x1="22" y1="94" x2="334" y2="94" stroke="#343B49"/>
    <text x="22" y="128" fill="#94A3B8" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">CHANGED</text>
    <rect x="22" y="144" width="312" height="42" rx="7" fill="#111318" stroke="#303642"/>
    <rect x="36" y="157" width="38" height="18" rx="4" fill="#5B4A18"/>
    <text x="44" y="171" fill="#FDE68A" font-family="SFMono-Regular, Menlo, monospace" font-size="12"> M</text>
    <text x="90" y="171" fill="#E2E8F0" font-family="SFMono-Regular, Menlo, monospace" font-size="14">notes/daily.md</text>
    <text x="22" y="212" fill="#94A3B8" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">UNTRACKED</text>
    <rect x="22" y="228" width="312" height="42" rx="7" fill="#111318" stroke="#303642"/>
    <rect x="36" y="241" width="38" height="18" rx="4" fill="#123E52"/>
    <text x="44" y="255" fill="#BAE6FD" font-family="SFMono-Regular, Menlo, monospace" font-size="12">??</text>
    <text x="90" y="255" fill="#E2E8F0" font-family="SFMono-Regular, Menlo, monospace" font-size="14">ideas/git.md</text>
  </g>
</svg>
